# 운영(EC2 서버) 전용 구성. 로컬용 docker-compose.yml과 별개의 "자립형" 파일이다.
# 실행(서버에서): docker compose -f docker-compose.prod.yml up -d --build
#
# 로컬용(docker-compose.yml)과 다른 점 3가지:
#  1) redis 컨테이너 없음 → Redis는 관리형(Upstash). 주소는 .env.production의 REDIS_URL(rediss://)로 주입.
#  2) caddy 추가 → 80/443에서 자동 HTTPS(Let's Encrypt) 후 web으로 리버스 프록시.
#  3) web은 호스트 포트를 열지 않음(expose만) → 외부 접근은 오직 caddy 경유(보안).

services:
  # ---------- Next.js 웹 서버 ----------
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: ssakssak-commit:prod # worker와 공유 → 이미지 한 번만 빌드
    command: npm run start
    env_file:
      - .env.production # 서버에 직접 둔 운영 env (DATABASE_URL/REDIS_URL/OPENAI/GITHUB/NEXTAUTH). 커밋 금지.
    environment:
      - NODE_ENV=production
    expose:
      - "3000" # 컨테이너 네트워크 내부에만 노출. caddy가 web:3000으로 접근.
    restart: unless-stopped

  # ---------- BullMQ 워커 ----------
  worker:
    image: ssakssak-commit:prod # web과 동일 이미지 재사용
    command: npm run worker:start:prod # .env 안 읽는 컨테이너 전용 스크립트
    env_file:
      - .env.production
    environment:
      - NODE_ENV=production
    depends_on:
      web:
        condition: service_started # 이미지 빌드는 web에서 한 번만
    restart: unless-stopped

  # ---------- Caddy (자동 HTTPS 리버스 프록시) ----------
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80" # http (인증서 발급 챌린지 + https 리다이렉트)
      - "443:443" # https
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro # 근무 수칙(읽기 전용)
      - caddy_data:/data # 발급받은 TLS 인증서 영속 (재시작 시 재발급 방지)
      - caddy_config:/config
    depends_on:
      web:
        condition: service_started
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
