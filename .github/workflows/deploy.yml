# main 브랜치 push → EC2 자동 재배포 (Stage 4 CI/CD)
#
# 흐름: 러너 공인 IP를 보안그룹 SSH(22)에 잠깐 추가 → SSH로 git pull + compose 재빌드 → IP 제거.
# 22번을 평소엔 내 IP로만 잠가두기 위한 "동적 보안그룹" 패턴.
# 필요한 Secrets: EC2_HOST / EC2_USER / EC2_SSH_KEY / AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY / EC2_SG_ID

name: Deploy to EC2

on:
  push:
    branches: [main]

# 배포가 겹치면 안 됨(같은 서버에서 docker build 동시 실행 → RAM 부족).
# 진행 중 배포가 있으면 뒤 배포는 대기.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: AWS 자격 증명 설정
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: 러너 공인 IP 조회
        id: runner-ip
        run: echo "ipv4=$(curl -fsS https://checkip.amazonaws.com)" >> "$GITHUB_OUTPUT"

      - name: 보안그룹에 러너 IP 임시 허용 (SSH 22)
        run: |
          aws ec2 authorize-security-group-ingress \
            --group-id "${{ secrets.EC2_SG_ID }}" \
            --protocol tcp --port 22 \
            --cidr "${{ steps.runner-ip.outputs.ipv4 }}/32"

      - name: SSH 접속 후 배포 실행
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          # t3.micro는 빌드가 5~15분 걸림(스왑 사용) → 기본 10m이면 타임아웃
          command_timeout: 30m
          script: |
            set -e
            cd ~/ssakssak-commit
            git fetch origin main
            # pull 대신 reset --hard: 서버에 우발적 로컬 변경이 있어도 항상 main과 일치.
            # untracked인 .env.production은 건드리지 않음.
            git reset --hard origin/main
            docker compose -f docker-compose.prod.yml up -d --build
            # 재빌드마다 쌓이는 dangling 이미지 정리 (30GB 디스크 보호)
            docker image prune -f

      - name: 러너 IP 허용 규칙 제거
        # 배포가 실패해도 22번에 뚫어둔 구멍은 반드시 닫는다
        if: always()
        run: |
          aws ec2 revoke-security-group-ingress \
            --group-id "${{ secrets.EC2_SG_ID }}" \
            --protocol tcp --port 22 \
            --cidr "${{ steps.runner-ip.outputs.ipv4 }}/32"
